services:
  api:
    build: .
    container_name: exmatch_rag_template_api
    env_file:
      - path: .env
        required: false
    environment:
      EMBEDDING_SERVICE_URL: ${EMBEDDING_SERVICE_URL:-http://host.docker.internal:8765}
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@db:5432/rag_template}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      # Allow running ingest/embed scripts inside the api container
      - ./scripts:/app/scripts:ro
      # Provide CSV inputs to the ingest scripts
      - ./data:/app/data:ro
      # QA 퀵메뉴 CSV (load_kprint_qa_quickmenu.py 기본 경로)
      - ./docs:/app/docs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  db:
    image: pgvector/pgvector:pg16
    container_name: exmatch_rag_template_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-rag_template}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: exmatch_rag_template_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  worker:
    build:
      context: ./embedding
      dockerfile: Dockerfile
    container_name: exmatch_rag_template_worker
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      POSTGRES_DSN: ${WORKER_POSTGRES_DSN:-postgresql+asyncpg://postgres:postgres@db:5432/rag_template}
      API_BASE_URL: ${WORKER_API_BASE_URL:-http://api:8000}
      LLM_QUEUE_NAME: ${LLM_QUEUE_NAME:-queue:llm}
      EMBEDDING_QUEUE_NAME: ${EMBEDDING_QUEUE_NAME:-queue:embedding}
      LLM_STREAM_PREFIX: ${LLM_STREAM_PREFIX:-stream:llm:}
      LLM_TRACE_PREFIX: ${LLM_TRACE_PREFIX:-trace:llm:}
      EMBED_RESULT_PREFIX: ${EMBED_RESULT_PREFIX:-result:embed:}
      EMBED_BATCH_SIZE: ${EMBED_BATCH_SIZE:-32}
      MAX_RETRY: ${MAX_RETRY:-3}
      RETRIEVAL_MODEL_ID: ${RETRIEVAL_MODEL_ID:-Qwen/Qwen3-Embedding-0.6B}
      RETRIEVAL_DEVICE: ${RETRIEVAL_DEVICE:-cpu}
      RETRIEVAL_TOP_K: ${RETRIEVAL_TOP_K:-8}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
