<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test_AI 챗봇 콘솔</title>
    <style>
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #f5f7fb; color: #111; }
      .wrap { max-width: 980px; margin: 28px auto; padding: 0 16px; }
      .card { background: #fff; border: 1px solid #e6e8f0; border-radius: 14px; overflow: hidden; }
      .head { padding: 16px 18px; border-bottom: 1px solid #eceff5; }
      .head h1 { margin: 0; font-size: 20px; }
      .head p { margin: 6px 0 0; color: #5d6470; font-size: 13px; }
      .category-wrap { border-bottom: 1px solid #eceff5; padding: 12px 14px; background: #f8fafc; }
      .cat-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 8px; }
      button.cat-btn {
        border: 1px solid #d9e0ec;
        border-radius: 999px;
        padding: 7px 12px;
        background: #ffffff !important;
        color: #0f172a !important;
        box-shadow: none !important;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button.cat-btn:hover {
        background: #f1f5f9 !important;
        border-color: #cbd5e1 !important;
        color: #0f172a !important;
      }
      .cat-chips { display: flex; gap: 8px; flex-wrap: wrap; background: #fff; }
      button.cat-chip {
        border: 1px solid #d9e0ec;
        border-radius: 10px;
        padding: 7px 11px;
        background: #ffffff !important;
        color: #0f172a !important;
        box-shadow: none !important;
        font-size: 12px;
        font-weight: 500;
        cursor: pointer;
      }
      button.cat-chip:hover {
        background: #f8fafc !important;
        border-color: #cbd5e1 !important;
        color: #0f172a !important;
      }
      .cat-status { margin-top: 8px; font-size: 12px; color: #64748b; }
      .chat-log { height: 46vh; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; background: #fbfcff; }
      .msg { max-width: 92%; border-radius: 12px; padding: 10px 12px; line-height: 1.5; font-size: 14px; display: flex; flex-direction: column; gap: 10px; }
      .msg-text { white-space: pre-wrap; word-break: break-word; }
      .msg.user { align-self: flex-end; background: #111827; color: #fff; max-width: 78%; }
      .msg.bot { align-self: flex-start; background: #fff; border: 1px solid #e3e8f3; color: #111; }
      .suggestion-carousel { width: 100%; overflow-x: auto; padding-bottom: 4px; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
      .suggestion-track { display: flex; gap: 12px; flex-wrap: nowrap; padding: 2px 0; }
      .suggestion-card {
        flex: 0 0 min(268px, 85vw);
        scroll-snap-align: start;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 10px;
        background: #f8fafc;
        display: flex;
        flex-direction: column;
        gap: 8px;
        box-shadow: 0 1px 2px rgba(15, 23, 42, 0.06);
      }
      .suggestion-thumb {
        height: 100px;
        border-radius: 10px;
        background: #e2e8f0;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .suggestion-thumb img { width: 100%; height: 100%; object-fit: contain; }
      .suggestion-thumb-ph { font-size: 12px; color: #64748b; font-weight: 600; }
      .suggestion-title { font-weight: 700; font-size: 13px; line-height: 1.35; color: #0f172a; }
      .suggestion-sub { font-size: 12px; color: #475569; line-height: 1.45; max-height: 4.2em; overflow: hidden; }
      button.suggestion-detail-btn {
        margin-top: auto;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        padding: 7px 10px;
        background: #fff !important;
        color: #0f172a !important;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
      }
      button.suggestion-detail-btn:hover { background: #f1f5f9 !important; border-color: #94a3b8 !important; }
      .composer { border-top: 1px solid #eceff5; padding: 12px; display: grid; grid-template-columns: 1fr auto; gap: 8px; }
      textarea { width: 100%; min-height: 50px; max-height: 160px; resize: vertical; border: 1px solid #d8deea; border-radius: 10px; padding: 10px; font: inherit; }
      #send-btn { border: 0; background: #1e293b; color: #fff; border-radius: 10px; padding: 0 16px; font-weight: 600; cursor: pointer; }
      #send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
      .status { padding: 8px 14px 0; font-size: 12px; color: #6b7280; }
      .error { color: #b91c1c; }
      .trace-wrap { border-top: 1px solid #eceff5; padding: 12px; background: #f8fafc; }
      .trace-title { margin: 0 0 8px; font-size: 13px; color: #334155; font-weight: 600; }
      .trace-cols { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
      .trace-col { background: #fff; border: 1px solid #e5e7eb; border-radius: 10px; padding: 10px; }
      .trace-col h3 { margin: 0 0 8px; font-size: 12px; color: #0f172a; }
      .trace-log { max-height: 180px; overflow-y: auto; display: flex; flex-direction: column; gap: 6px; }
      .trace-item { border-left: 3px solid #cbd5e1; background: #fff; border-radius: 8px; padding: 6px 8px; font-size: 12px; line-height: 1.4; }
      .trace-item.done { border-left-color: #16a34a; }
      .trace-item.error { border-left-color: #dc2626; }
      .trace-meta { color: #475569; margin-bottom: 2px; }
      .faq-follow-wrap { margin-top: 10px; display: flex; flex-wrap: wrap; gap: 6px; }
      button.faq-follow-btn {
        border: 1px solid #cbd5e1;
        border-radius: 999px;
        padding: 5px 10px;
        background: #f8fafc !important;
        color: #0f172a !important;
        box-shadow: none !important;
        font-size: 12px;
        cursor: pointer;
      }
      button.faq-follow-btn:hover {
        background: #eef2f7 !important;
        border-color: #94a3b8 !important;
        color: #0f172a !important;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="head">
          <h1>운영 챗봇 UI (Test_AI + Queue + SSE)</h1>
          <p>카테고리로 저장 답변을 바로 보고, 필요하면 자유 질문을 <code>/chat</code> 큐로 전송할 수 있습니다.</p>
        </div>

        <div class="category-wrap">
          <div class="cat-row">
            <button type="button" class="cat-btn" data-user="visitor">참관객 FAQ</button>
            <button type="button" class="cat-btn" data-user="exhibitor">참가업체 FAQ</button>
          </div>
          <div id="cat-chips" class="cat-chips"></div>
          <div id="cat-status" class="cat-status">카테고리 로딩 중...</div>
        </div>

        <div id="chat-log" class="chat-log"></div>
        <div id="status" class="status">준비됨</div>
        <div class="trace-wrap">
          <p class="trace-title">질문 처리 로그 (현재 요청) — 검색 / RRF / OpenAI 분리</p>
          <div class="trace-cols">
            <div class="trace-col">
              <h3>검색(임베딩/의미검색)</h3>
              <div id="trace-search" class="trace-log"></div>
            </div>
            <div class="trace-col">
              <h3>RRF/컨텍스트</h3>
              <div id="trace-rrf" class="trace-log"></div>
            </div>
            <div class="trace-col">
              <h3>OpenAI/최종답변</h3>
              <div id="trace-openai" class="trace-log"></div>
            </div>
          </div>
        </div>
        <form id="chat-form" class="composer">
          <textarea id="message" placeholder="메시지를 입력하세요"></textarea>
          <button id="send-btn" type="submit">전송</button>
        </form>
      </div>
    </div>

    <script>
      (function () {
        const form = document.getElementById("chat-form");
        const input = document.getElementById("message");
        const log = document.getElementById("chat-log");
        const statusEl = document.getElementById("status");
        const sendBtn = document.getElementById("send-btn");
        const traceSearchEl = document.getElementById("trace-search");
        const traceRrfEl = document.getElementById("trace-rrf");
        const traceOpenaiEl = document.getElementById("trace-openai");
        const catChipsEl = document.getElementById("cat-chips");
        const catStatusEl = document.getElementById("cat-status");
        const catBtns = Array.from(document.querySelectorAll(".cat-btn"));
        const sessionId = "web-" + Math.random().toString(36).slice(2, 10);
        let traceTimer = null;
        let currentFaqUser = "visitor";

        function addMessage(role, text) {
          const box = document.createElement("div");
          box.className = "msg " + (role === "user" ? "user" : "bot");
          const textEl = document.createElement("div");
          textEl.className = "msg-text";
          textEl.textContent = text;
          box.appendChild(textEl);
          log.appendChild(box);
          log.scrollTop = log.scrollHeight;
          return box;
        }

        function parseSsePayloadData(raw) {
          if (raw == null || raw === "") return raw;
          try {
            return JSON.parse(raw);
          } catch (e) {
            return raw;
          }
        }

        function renderSuggestionCarousel(botBox, cards) {
          if (!Array.isArray(cards) || !cards.length) return;
          if (botBox.querySelector(".suggestion-carousel")) return;
          const wrap = document.createElement("div");
          wrap.className = "suggestion-carousel";
          const track = document.createElement("div");
          track.className = "suggestion-track";
          cards.forEach(function (c) {
            const imgUrl = String(c.image_url || "").trim();
            const kind = String(c.entity_kind || "");
            const follow = String(c.follow_prompt || "").trim();
            const card = document.createElement("article");
            card.className = "suggestion-card";
            const thumb = document.createElement("div");
            thumb.className = "suggestion-thumb";
            if (imgUrl) {
              const im = document.createElement("img");
              im.src = imgUrl;
              im.alt = "";
              im.referrerPolicy = "no-referrer";
              im.loading = "lazy";
              im.onerror = function () {
                thumb.innerHTML = "";
                const ph = document.createElement("span");
                ph.className = "suggestion-thumb-ph";
                ph.textContent = kind === "exhibit_item" ? "이미지 없음 · 제품" : "이미지 없음 · 기업";
                thumb.appendChild(ph);
              };
              thumb.appendChild(im);
            } else {
              const ph = document.createElement("span");
              ph.className = "suggestion-thumb-ph";
              ph.textContent = kind === "exhibit_item" ? "이미지 없음 · 제품" : "이미지 없음 · 기업";
              thumb.appendChild(ph);
            }
            const body = document.createElement("div");
            body.className = "suggestion-body";
            const t = document.createElement("div");
            t.className = "suggestion-title";
            t.textContent = c.title || "";
            const st = document.createElement("div");
            st.className = "suggestion-sub";
            st.textContent = c.subtitle || "";
            body.appendChild(t);
            body.appendChild(st);
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "suggestion-detail-btn";
            btn.textContent = "자세히 보기";
            btn.addEventListener("click", function () {
              input.value = follow || (String(c.title || "") + "에 대해 자세히 알려줘");
              input.focus();
              form.requestSubmit();
            });
            card.appendChild(thumb);
            card.appendChild(body);
            card.appendChild(btn);
            track.appendChild(card);
          });
          wrap.appendChild(track);
          botBox.appendChild(wrap);
        }

        async function getJson(url) {
          const res = await fetch(url);
          const payload = await res.json();
          if (!res.ok) {
            throw new Error(typeof payload.detail === "string" ? payload.detail : "요청 실패");
          }
          return payload;
        }

        /** CSV에 quickmenu_label이 비어 있을 때 칩 문구 (API의 quickmenu_display_label과 동일 규칙). */
        function quickmenuDisplayLabel(it) {
          if (!it || typeof it !== "object") return "";
          const d = String(it.quickmenu_display_label || "").trim();
          if (d) return d;
          for (const k of ["quickmenu_label", "subcategory", "category", "domain"]) {
            const v = String(it[k] || "").trim();
            if (v && v !== "-") return v;
          }
          return String(it.qna_code || "").trim();
        }

        async function loadPrimaryCategories(userType) {
          currentFaqUser = userType;
          catStatusEl.textContent = "카테고리 로딩 중...";
          catChipsEl.innerHTML = "";
          try {
            const data = await getJson("/tools/embedding/api/qa-quickmenu/primary?qa_user=" + encodeURIComponent(userType));
            const items = data.items || [];
            if (!items.length) {
              catStatusEl.textContent = "표시할 카테고리가 없습니다.";
              return;
            }
            items.forEach((item) => {
              const chip = document.createElement("button");
              chip.type = "button";
              chip.className = "cat-chip";
              chip.textContent = quickmenuDisplayLabel(item);
              chip.addEventListener("click", async () => {
                await showStoredAnswer(item.qna_code, true);
              });
              catChipsEl.appendChild(chip);
            });
            catStatusEl.textContent = "카테고리를 선택하면 저장된 답변을 바로 보여줍니다.";
          } catch (e) {
            catStatusEl.textContent = "카테고리 로드 실패: " + (e.message || String(e));
          }
        }

        function addFaqAnswerMessage(item, followItems) {
          const answerText = (item.answer_sample || item.answer_question || "저장된 답변이 없습니다.").trim();
          const linkText = (item.links || "").trim();
          return "A. " + answerText + (linkText ? ("\\n링크: " + linkText) : "");
        }

        function sleep(ms) {
          return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function streamFaqAnswerLikeSearch(item, followItems) {
          // 1초 정도 로딩 버블을 먼저 보여줘서 일반 채팅 응답 대기감과 유사하게 만든다.
          const loadingBox = document.createElement("div");
          loadingBox.className = "msg bot";
          loadingBox.textContent = "답변 준비 중";
          log.appendChild(loadingBox);
          log.scrollTop = log.scrollHeight;

          let dot = 0;
          const loadingTimer = window.setInterval(() => {
            dot = (dot + 1) % 4;
            loadingBox.textContent = "답변 준비 중" + ".".repeat(dot);
            log.scrollTop = log.scrollHeight;
          }, 240);

          statusEl.classList.remove("error");
          statusEl.textContent = "FAQ 응답 생성 대기 중...";
          await sleep(1000);
          window.clearInterval(loadingTimer);
          loadingBox.remove();

          const botBox = document.createElement("div");
          botBox.className = "msg bot";
          botBox.textContent = "";
          log.appendChild(botBox);
          log.scrollTop = log.scrollHeight;

          statusEl.textContent = "카테고리 응답을 검색/조합 중...";

          const finalText = addFaqAnswerMessage(item, followItems);
          const tokens = finalText.split(/(\s+)/);
          for (const tk of tokens) {
            botBox.textContent += tk;
            log.scrollTop = log.scrollHeight;
            await sleep(16 + Math.floor(Math.random() * 18));
          }

          if (Array.isArray(followItems) && followItems.length) {
            const wrap = document.createElement("div");
            wrap.className = "faq-follow-wrap";
            followItems.forEach((n) => {
              const b = document.createElement("button");
              b.type = "button";
              b.className = "faq-follow-btn";
              b.textContent = quickmenuDisplayLabel(n);
              b.addEventListener("click", async () => {
                await showStoredAnswer(n.qna_code, true);
              });
              wrap.appendChild(b);
            });
            botBox.appendChild(wrap);
          }
          statusEl.textContent = "완료";
        }

        async function showStoredAnswer(qnaCode, withFollow) {
          try {
            const detail = await getJson("/tools/embedding/api/qa-quickmenu/" + encodeURIComponent(qnaCode));
            const item = detail.item || {};
            const qText = (item.question_sample || quickmenuDisplayLabel(item) || qnaCode).trim();
            if (qText) {
              input.value = qText; // 질문 UI에 자동 반영
              addMessage("user", qText);
            }

            let nextItems = [];

            if (withFollow) {
              // qa_quickmenu_one 응답의 follow_questions_resolved를 우선 사용한다.
              // (raw code + resolved row(item) 동시 포함)
              const resolved = Array.isArray(item.follow_questions_resolved) ? item.follow_questions_resolved : [];
              if (resolved.length) {
                nextItems = resolved.map((r) => {
                  const it = r.item || {};
                  const code = String(r.resolved_qna_code || r.code || "").trim();
                  return {
                    qna_code: code || String(r.code || "").trim(),
                    quickmenu_label: quickmenuDisplayLabel(it) || code || String(r.code || "").trim(),
                  };
                });
              } else {
                // 하위 호환: resolved가 없는 경우에만 follow-links 엔드포인트를 보조 사용
                const next = await getJson("/tools/embedding/api/qa-quickmenu/" + encodeURIComponent(qnaCode) + "/follow-links");
                nextItems = next.items || [];
              }
              catStatusEl.textContent = nextItems.length
                ? "답변 아래 후속 질문 버튼이 생성되었습니다."
                : "후속 질문이 없는 항목입니다.";
            }

            await streamFaqAnswerLikeSearch(item, nextItems);
          } catch (e) {
            addMessage("bot", "저장 FAQ 조회 실패: " + (e.message || String(e)));
          }
        }

        async function enqueueChat(message) {
          const fd = new FormData();
          fd.append("session_id", sessionId);
          fd.append("message", message);
          const res = await fetch("/chat", { method: "POST", body: fd });
          const payload = await res.json();
          if (!res.ok) {
            throw new Error(typeof payload.detail === "string" ? payload.detail : "요청 실패");
          }
          return payload.request_id;
        }

        function streamAnswer(requestId, botBox) {
          const textEl = botBox.querySelector(".msg-text");
          return new Promise(function (resolve, reject) {
            if (!textEl) {
              reject(new Error("메시지 영역을 찾을 수 없습니다."));
              return;
            }
            const es = new EventSource("/stream/" + encodeURIComponent(requestId));
            es.addEventListener("token", function (evt) {
              const piece = parseSsePayloadData(evt.data);
              textEl.textContent += typeof piece === "string" ? piece : String(piece || "");
              log.scrollTop = log.scrollHeight;
            });
            es.addEventListener("cards", function (evt) {
              const cards = parseSsePayloadData(evt.data);
              if (Array.isArray(cards) && cards.length) {
                renderSuggestionCarousel(botBox, cards);
                log.scrollTop = log.scrollHeight;
              }
            });
            es.addEventListener("done", function () {
              es.close();
              resolve();
            });
            es.addEventListener("error", function (evt) {
              es.close();
              const d = parseSsePayloadData(evt.data);
              reject(new Error(typeof d === "string" ? d : "스트림 오류"));
            });
            es.onerror = function () {
              es.close();
              reject(new Error("SSE 연결이 종료되었습니다."));
            };
          });
        }

        function _appendTrace(container, item) {
          const div = document.createElement("div");
          const status = String(item.status || "");
          const t = String(item.time || "");
          div.className = "trace-item" + (status ? (" " + status) : "");
          div.innerHTML =
            "<div class='trace-meta'><strong>" + (item.stage || "-") + "</strong> · " + status + (t ? (" · " + t) : "") + "</div>" +
            "<div>" + (item.detail || "") + "</div>";
          container.appendChild(div);
        }

        function renderTrace(items) {
          traceSearchEl.innerHTML = "";
          traceRrfEl.innerHTML = "";
          traceOpenaiEl.innerHTML = "";
          (items || []).forEach(function (item) {
            const stage = String(item.stage || "");
            if (stage === "retrieval_step_4" || stage === "retrieval_step_1" || stage === "retrieval_step_2" || stage === "retrieval_step_3") {
              _appendTrace(traceSearchEl, item);
            } else if (stage === "retrieval_step_5" || stage === "retrieval_step_6") {
              _appendTrace(traceRrfEl, item);
            } else if (stage === "retrieval_step_99") {
              _appendTrace(traceOpenaiEl, item);
            } else if (stage.indexOf("openai") >= 0) {
              _appendTrace(traceOpenaiEl, item);
            } else {
              _appendTrace(traceSearchEl, item);
            }
          });
          traceSearchEl.scrollTop = traceSearchEl.scrollHeight;
          traceRrfEl.scrollTop = traceRrfEl.scrollHeight;
          traceOpenaiEl.scrollTop = traceOpenaiEl.scrollHeight;
        }

        async function pollTrace(requestId) {
          const res = await fetch("/chat/trace/" + encodeURIComponent(requestId));
          const payload = await res.json();
          if (!res.ok) {
            throw new Error(typeof payload.detail === "string" ? payload.detail : "trace 조회 실패");
          }
          renderTrace(payload.trace || []);
        }

        catBtns.forEach((btn) => {
          btn.addEventListener("click", () => {
            loadPrimaryCategories(btn.getAttribute("data-user") || "visitor");
          });
        });

        form.addEventListener("submit", async function (e) {
          e.preventDefault();
          const text = (input.value || "").trim();
          if (!text) return;

          addMessage("user", text);
          input.value = "";
          sendBtn.disabled = true;
          statusEl.classList.remove("error");
          statusEl.textContent = "요청을 큐에 등록하는 중...";

          const botEl = addMessage("bot", "");
          try {
            const requestId = await enqueueChat(text);
            traceSearchEl.innerHTML = "";
            traceRrfEl.innerHTML = "";
            traceOpenaiEl.innerHTML = "";
            await pollTrace(requestId);
            if (traceTimer) {
              window.clearInterval(traceTimer);
            }
            traceTimer = window.setInterval(function () {
              pollTrace(requestId).catch(function () {});
            }, 800);
            statusEl.textContent = "워커 응답을 스트리밍으로 수신 중...";
            await streamAnswer(requestId, botEl);
            await pollTrace(requestId);
            statusEl.textContent = "완료";
          } catch (err) {
            const te = botEl.querySelector(".msg-text");
            if (te) te.textContent = "오류: " + (err.message || String(err));
            else botEl.textContent = "오류: " + (err.message || String(err));
            statusEl.classList.add("error");
            statusEl.textContent = "오류가 발생했습니다.";
          } finally {
            if (traceTimer) {
              window.clearInterval(traceTimer);
              traceTimer = null;
            }
            sendBtn.disabled = false;
          }
        });

        addMessage("bot", "안녕하세요. Test_AI 입니다. 상단 카테고리를 먼저 눌러 빠르게 FAQ를 확인하거나, 아래에 자유 질문을 입력해 주세요.");
        loadPrimaryCategories(currentFaqUser);
      })();
    </script>
