# 임베딩 EC2에서 실행. .env 에 REDIS_URL·API_BASE_URL 을 메인(EC2-1) 과 맞춰야 /chat 큐가 처리됨 (embedding/.env.example 참고).
services:
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped

  embed_api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "9000:9000"
    command: ["python", "-m", "worker.api_main"]
    restart: unless-stopped
