<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Embedding Tool</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 32px; max-width: 900px; }
      h1 { margin-bottom: 8px; }
      p { color: #444; }
      form { margin-top: 20px; padding: 16px; border: 1px solid #ddd; border-radius: 8px; }
      .row { margin-bottom: 12px; }
      label { display: block; margin-bottom: 4px; font-weight: 600; }
      input { width: 100%; padding: 8px; box-sizing: border-box; }
      button { padding: 10px 14px; border: 0; background: #111; color: #fff; border-radius: 6px; cursor: pointer; }
      code { background: #f3f3f3; padding: 2px 5px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>new_company → Qwen 임베딩 변환</h1>
    <p>
      <code>new_company</code> 테이블 데이터를 <code>Qwen/Qwen3-VL-Embedding-2B</code>로 임베딩하여
      KOR/ENG 분리 결과(JSONL ZIP)를 다운로드합니다.
    </p>

    <form action="/embed" method="post">
      <div class="row">
        <label for="model_id">Model ID</label>
        <input id="model_id" type="text" name="model_id" value="Qwen/Qwen3-VL-Embedding-2B" />
      </div>

      <div class="row">
        <label for="device">Device (cpu / mps / cuda)</label>
        <input id="device" type="text" name="device" value="cpu" />
      </div>

      <div class="row">
        <label for="batch_size">Batch Size</label>
        <input id="batch_size" type="number" name="batch_size" value="8" min="1" />
      </div>

      <div class="row">
        <label for="evidence_max_chars">Evidence Max Chars</label>
        <input id="evidence_max_chars" type="number" name="evidence_max_chars" value="1200" min="200" />
      </div>

      <div class="row">
        <label for="evidence_overlap">Evidence Overlap</label>
        <input id="evidence_overlap" type="number" name="evidence_overlap" value="150" min="0" />
      </div>

      <div class="row">
        <label for="limit">new_company Row Limit (빈 값이면 전체)</label>
        <input id="limit" type="number" name="limit" min="1" />
      </div>

      <button type="submit">임베딩 실행 후 ZIP 다운로드</button>
    </form>
  </body>
</html>
