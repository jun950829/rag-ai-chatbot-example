<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Embedding Tool</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 20px; }
      h1 { margin-bottom: 8px; }
      p { color: #444; }
      .layout { display: flex; gap: 16px; align-items: flex-start; }
      .col { width: 50%; min-width: 0; }
      .card { border: 1px solid #ddd; border-radius: 10px; padding: 14px; background: #fff; }
      form { margin-top: 8px; }
      .row { margin-bottom: 10px; }
      label { display: block; margin-bottom: 4px; font-weight: 600; }
      input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 6px; }
      textarea { min-height: 80px; resize: vertical; }
      button { padding: 10px 14px; border: 0; background: #111; color: #fff; border-radius: 6px; cursor: pointer; }
      button:disabled { opacity: 0.55; cursor: not-allowed; }
      code { background: #f3f3f3; padding: 2px 5px; border-radius: 3px; }
      .muted { color: #666; font-size: 13px; }
      #progress-panel { display: none; margin-top: 12px; padding: 12px; border: 1px solid #bbb; border-radius: 8px; background: #fafafa; }
      #progress-panel.active { display: block; }
      #job_bar { width: 100%; height: 14px; margin: 10px 0; }
      .job-meta { display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; font-size: 14px; color: #333; }
      #job_message { margin: 8px 0 0; line-height: 1.45; }
      #job_error { margin-top: 12px; padding: 10px; background: #ffe8e8; border-radius: 6px; color: #8b0000; white-space: pre-wrap; display: none; }
      #job_error.visible { display: block; }
      #job_result { margin-top: 12px; padding: 10px; background: #eef6ff; border-radius: 6px; display: none; }
      #job_result.visible { display: block; }
      .pulse { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #0a0; margin-right: 6px; animation: pulse 1.2s ease-in-out infinite; }
      #search_error { margin-top: 10px; padding: 10px; background: #ffe8e8; border-radius: 6px; color: #8b0000; white-space: pre-wrap; display: none; }
      #search_error.visible { display: block; }
      #search_result { margin-top: 10px; }
      #search_result table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 12px; }
      #search_result th, #search_result td { border: 1px solid #ddd; padding: 6px; text-align: left; vertical-align: top; }
      .pill { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 11px; background: #f0f0f0; margin-right: 4px; }
      @keyframes pulse { 0%, 100% { opacity: 0.35; transform: scale(0.9); } 50% { opacity: 1; transform: scale(1); } }
      @media (max-width: 1000px) { .layout { flex-direction: column; } .col { width: 100%; } }
    </style>
  </head>
  <body>
    <h1>new_company 임베딩 + 검색</h1>
    <p><code>new_company</code>에서 임베딩을 생성/적재하고, 같은 모델로 검색어를 임베딩해 4개 테이블에서 유사도를 조회합니다.</p>

    <div class="layout">
      <section class="col card">
        <h2>임베딩 적재</h2>
        <form id="embed-form">
          <div class="row">
            <label for="model_id">Model ID</label>
            <input id="model_id" type="text" name="model_id" value="Qwen/Qwen3-Embedding-0.6B" />
          </div>
          <div class="row">
            <label for="device">Device (cpu / mps / cuda)</label>
            <input id="device" type="text" name="device" value="mps" />
          </div>
          <div class="row">
            <label for="batch_size">Batch Size</label>
            <input id="batch_size" type="number" name="batch_size" value="8" min="1" />
          </div>
          <div class="row">
            <label for="entity_batch_size">Entity Batch Size</label>
            <input id="entity_batch_size" type="number" name="entity_batch_size" value="64" min="1" />
          </div>
          <div class="row">
            <label for="evidence_max_chars">Evidence Max Chars</label>
            <input id="evidence_max_chars" type="number" name="evidence_max_chars" value="1200" min="200" />
          </div>
          <div class="row">
            <label for="evidence_overlap">Evidence Overlap</label>
            <input id="evidence_overlap" type="number" name="evidence_overlap" value="150" min="0" />
          </div>
          <div class="row">
            <label for="limit">new_company Row Limit (빈 값이면 전체)</label>
            <input id="limit" type="number" name="limit" min="1" />
          </div>
          <button type="submit" id="submit_btn">임베딩 실행 후 DB 적재</button>
        </form>

        <div id="progress-panel">
          <strong><span class="pulse" id="pulse_dot" aria-hidden="true"></span><span id="panel_title">진행 중</span></strong>
          <progress id="job_bar" max="100" value="0"></progress>
          <div class="job-meta">
            <span id="job_percent">0%</span>
            <span>경과: <span id="elapsed">0</span>초</span>
          </div>
          <p id="job_message">작업을 시작합니다…</p>
          <div id="job_error"></div>
          <div id="job_result"></div>
        </div>
      </section>

      <section class="col card">
        <h2>벡터 검색</h2>
        <p class="muted">검색어를 임베딩 후 4개 테이블에서 유사도 순으로 반환합니다.</p>
        <form id="search-form">
          <div class="row">
            <label for="search_query">검색어</label>
            <textarea id="search_query" name="query" placeholder="예: 이동형 X-ray, AI 영상 분석, 혈압 측정 장비"></textarea>
          </div>
          <div class="row">
            <label for="search_model_id">Model ID</label>
            <input id="search_model_id" type="text" name="model_id" value="Qwen/Qwen3-Embedding-0.6B" />
          </div>
          <div class="row">
            <label for="search_device">Device</label>
            <input id="search_device" type="text" name="device" value="mps" />
          </div>
          <div class="row">
            <label for="search_top_k">Top K</label>
            <input id="search_top_k" type="number" name="top_k" value="10" min="1" max="100" />
          </div>
          <div class="row">
            <label for="search_lang">Language Filter</label>
            <select id="search_lang" name="lang">
              <option value="all">all</option>
              <option value="kor">kor</option>
              <option value="eng">eng</option>
            </select>
          </div>
          <div class="row">
            <label for="search_chunk_type">Chunk Type</label>
            <select id="search_chunk_type" name="chunk_type">
              <option value="all">all</option>
              <option value="profile">profile</option>
              <option value="evidence">evidence</option>
            </select>
          </div>
          <div class="row">
            <label for="answer_mode">응답 생성 방식</label>
            <select id="answer_mode" name="answer_mode">
              <option value="template">template (규칙기반, 빠름)</option>
              <option value="ollama">ollama (로컬 무료 LLM)</option>
            </select>
          </div>
          <div class="row">
            <label for="llm_model">LLM Model (Ollama)</label>
            <input id="llm_model" type="text" name="llm_model" value="qwen2.5:3b-instruct" />
          </div>
          <div class="row">
            <label for="llm_base_url">Ollama Base URL</label>
            <input id="llm_base_url" type="text" name="llm_base_url" value="http://localhost:11434" />
          </div>
          <button type="submit" id="search_btn">검색 실행</button>
        </form>
        <div id="search_error"></div>
        <div id="search_result"></div>
      </section>
    </div>

    <script>
(function () {
  const form = document.getElementById("embed-form");
  const panel = document.getElementById("progress-panel");
  const bar = document.getElementById("job_bar");
  const msg = document.getElementById("job_message");
  const pct = document.getElementById("job_percent");
  const elapsedEl = document.getElementById("elapsed");
  const errBox = document.getElementById("job_error");
  const btn = document.getElementById("submit_btn");
  const pulse = document.getElementById("pulse_dot");
  const titleEl = document.getElementById("panel_title");
  const resultBox = document.getElementById("job_result");

  const searchForm = document.getElementById("search-form");
  const searchBtn = document.getElementById("search_btn");
  const searchError = document.getElementById("search_error");
  const searchResult = document.getElementById("search_result");

  function resetError() {
    errBox.textContent = "";
    errBox.classList.remove("visible");
  }
  function showError(text) {
    errBox.textContent = text;
    errBox.classList.add("visible");
  }
  function resetResult() {
    resultBox.textContent = "";
    resultBox.classList.remove("visible");
  }
  function showResult(payload) {
    const counts = payload.upsert_counts || {};
    const rowsInNewCompany = payload.rows_in_new_company || "-";
    const total = payload.total_upserted || 0;
    resultBox.innerHTML =
      "<strong>적재 결과</strong>" +
      "<div>new_company rows: <code>" + rowsInNewCompany + "</code></div>" +
      "<div>total upserted: <code>" + total + "</code></div>" +
      "<table><thead><tr><th>table</th><th>upserted</th></tr></thead><tbody>" +
      Object.keys(counts).map(function (k) {
        return "<tr><td><code>" + k + "</code></td><td>" + counts[k] + "</td></tr>";
      }).join("") +
      "</tbody></table>";
    resultBox.classList.add("visible");
  }

  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    resetError();
    resetResult();
    const fd = new FormData(form);
    const limitVal = (document.getElementById("limit").value || "").trim();
    if (!limitVal) fd.delete("limit");

    btn.disabled = true;
    panel.classList.add("active");
    bar.value = 0;
    pct.textContent = "0%";
    msg.textContent = "서버에 작업을 등록하는 중…";
    titleEl.textContent = "진행 중";
    pulse.style.display = "inline-block";

    const t0 = Date.now();
    let pollTimer = null;
    const elapsedTimer = window.setInterval(function () {
      elapsedEl.textContent = String(Math.floor((Date.now() - t0) / 1000));
    }, 400);

    function stopTimers() {
      window.clearInterval(elapsedTimer);
      if (pollTimer) {
        window.clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    try {
      const startRes = await fetch("/embed/job", { method: "POST", body: fd });
      const startText = await startRes.text();
      let startJson;
      try { startJson = JSON.parse(startText); } catch (_) { throw new Error(startRes.ok ? "서버 응답이 JSON이 아닙니다." : startText.slice(0, 400)); }
      if (!startRes.ok) {
        const d = startJson.detail;
        throw new Error(typeof d === "string" ? d : JSON.stringify(d));
      }
      const jobId = startJson.job_id;
      if (!jobId) throw new Error("job_id가 없습니다.");

      async function pollOnce() {
        const st = await fetch("/embed/job/" + encodeURIComponent(jobId) + "/status");
        const stText = await st.text();
        let j;
        try { j = JSON.parse(stText); } catch (_) { throw new Error("상태 응답 파싱 실패"); }
        if (!st.ok) throw new Error(j.detail || stText);
        const p = typeof j.percent === "number" ? j.percent : 0;
        bar.value = p;
        pct.textContent = p + "%";
        msg.textContent = "[" + p + "%] " + (j.message || "…");

        if (j.status === "done") {
          stopTimers();
          titleEl.textContent = "완료";
          pulse.style.display = "none";
          msg.textContent = "임베딩 및 DB 적재가 완료되었습니다.";
          if (j.result) showResult(j.result);
          btn.disabled = false;
          return true;
        }
        if (j.status === "error") {
          stopTimers();
          titleEl.textContent = "오류";
          pulse.style.display = "none";
          showError(j.error_detail || j.message || "알 수 없는 오류");
          btn.disabled = false;
          return true;
        }
        return false;
      }

      const finished = await pollOnce();
      if (!finished) {
        pollTimer = window.setInterval(async function () {
          try {
            const done = await pollOnce();
            if (done) return;
          } catch (ex) {
            stopTimers();
            showError(ex.message || String(ex));
            titleEl.textContent = "오류";
            pulse.style.display = "none";
            btn.disabled = false;
          }
        }, 450);
      }
    } catch (ex) {
      stopTimers();
      showError(ex.message || String(ex));
      titleEl.textContent = "오류";
      pulse.style.display = "none";
      btn.disabled = false;
    }
  });

  function showSearchError(text) {
    searchError.textContent = text;
    searchError.classList.add("visible");
  }
  function resetSearchError() {
    searchError.textContent = "";
    searchError.classList.remove("visible");
  }
  function renderSearchResults(payload) {
    const items = payload.results || [];
    const answer = payload.answer_korean || "";
    const answerMeta = payload.answer_meta || {};
    const metaText = (answerMeta.mode ? (" (" + answerMeta.mode + (answerMeta.model ? (", " + answerMeta.model) : "") + ")") : "");
    if (!items.length) {
      searchResult.innerHTML = "<p><strong>답변:</strong> " + answer + metaText + "</p><p class='muted'>결과가 없습니다.</p>";
      return;
    }
    const rows = items.map(function (r) {
      const score = (typeof r.score === "number") ? r.score.toFixed(4) : "-";
      const distance = (typeof r.distance === "number") ? r.distance.toFixed(4) : "-";
      return "<tr>" +
        "<td>" + score + "</td>" +
        "<td>" + distance + "</td>" +
        "<td><span class='pill'>" + (r.lang || "-") + "</span><span class='pill'>" + (r.chunk_typ || "-") + "</span></td>" +
        "<td><code>" + (r.external_id || "") + "</code></td>" +
        "<td><code>" + (r.table_name || "") + "</code></td>" +
        "<td>" + (r.source_field || "") + "</td>" +
        "<td>" + (r.chunk_index == null ? "" : String(r.chunk_index)) + "</td>" +
        "<td>" + (r.content || "").replace(/</g, "&lt;").replace(/>/g, "&gt;") + "</td>" +
        "</tr>";
    }).join("");

    searchResult.innerHTML =
      "<p><strong>답변:</strong> " + answer + metaText + "</p>" +
      "<div><strong>검색 결과</strong> " +
      "(count: <code>" + (payload.count || 0) + "</code>, top_k: <code>" + (payload.top_k || 0) + "</code>)</div>" +
      "<table><thead><tr>" +
      "<th>score</th><th>distance</th><th>tag</th><th>external_id</th><th>table</th><th>source_field</th><th>chunk_index</th><th>content</th>" +
      "</tr></thead><tbody>" + rows + "</tbody></table>";
  }

  searchForm.addEventListener("submit", async function (e) {
    e.preventDefault();
    resetSearchError();
    searchResult.innerHTML = "";

    const fd = new FormData(searchForm);
    if (!String(fd.get("query") || "").trim()) {
      showSearchError("검색어를 입력하세요.");
      return;
    }
    searchBtn.disabled = true;
    try {
      const res = await fetch("/search", { method: "POST", body: fd });
      const text = await res.text();
      let j;
      try { j = JSON.parse(text); } catch (_) { throw new Error(res.ok ? "서버 응답이 JSON이 아닙니다." : text.slice(0, 500)); }
      if (!res.ok) {
        const d = j.detail;
        throw new Error(typeof d === "string" ? d : JSON.stringify(d));
      }
      renderSearchResults(j);
    } catch (ex) {
      showSearchError(ex.message || String(ex));
    } finally {
      searchBtn.disabled = false;
    }
  });
})();
    </script>
  </body>
</html>
